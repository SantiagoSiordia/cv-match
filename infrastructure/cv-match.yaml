# CV Match on ECS Fargate + ALB + EFS + Amazon Bedrock
#
# Deploy (replace placeholders):
#   aws cloudformation deploy \
#     --stack-name cv-match \
#     --template-file infrastructure/cv-match.yaml \
#     --capabilities CAPABILITY_NAMED_IAM \
#     --parameter-overrides \
#       VpcId=vpc-xxx \
#       PublicSubnet1=subnet-aaa \
#       PublicSubnet2=subnet-bbb \
#       ImageUri=123456789012.dkr.ecr.us-east-1.amazonaws.com/cv-match:latest
#
# Networking (cost vs security):
# - This template places tasks in public subnets with AssignPublicIp=ENABLED so they
#   can pull from ECR and call Bedrock without a NAT gateway. For production, use
#   private subnets, a NAT gateway or VPC endpoints (ECR, CloudWatch Logs, Bedrock).
#
# Bedrock: In the AWS console, enable access to your chosen foundation models for
# the account/region (IAM alone is not enough).

AWSTemplateFormatVersion: '2010-09-09'
Description: CV Match Next.js app on Fargate with EFS data volume and Bedrock IAM

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC for ALB, ECS tasks, and EFS mount targets

  PublicSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: First public subnet (different AZ from PublicSubnet2)

  PublicSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: Second public subnet (different AZ from PublicSubnet1)

  ImageUri:
    Type: String
    Description: Full ECR image URI (e.g.
      123456789012.dkr.ecr.region.amazonaws.com/cv-match:latest)

  DesiredCount:
    Type: Number
    Default: 1
    MinValue: 1
    Description: Number of Fargate tasks to run

  ContainerCpu:
    Type: Number
    Default: 512
    AllowedValues:
      - 256
      - 512
      - 1024
      - 2048
      - 4096
    Description: Fargate task CPU units

  ContainerMemory:
    Type: Number
    Default: 1024
    AllowedValues:
      - 512
      - 1024
      - 2048
      - 3072
      - 4096
      - 5120
      - 6144
      - 7168
      - 8192
    Description: Fargate task memory (MiB); must be valid for chosen CPU

  AllowedIngressCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR allowed to reach the load balancer on port 80

  BedrockTextModelId:
    Type: String
    Default: anthropic.claude-3-5-haiku-20241022-v1:0
    Description: Bedrock model id for JSON / text (must be enabled in console)

  BedrockEmbeddingModelId:
    Type: String
    Default: amazon.titan-embed-text-v2:0
    Description: Bedrock embedding model id (must be enabled in console)

Resources:
  AppLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ecs/cv-match-${AWS::StackName}
      RetentionInDays: 30

  DataFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting
      FileSystemTags:
        - Key: Name
          Value: !Sub cv-match-data-${AWS::StackName}

  EfsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub cv-match-efs-${AWS::StackName}
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref EcsTaskSecurityGroup

  EfsMountTarget1:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref DataFileSystem
      SubnetId: !Ref PublicSubnet1
      SecurityGroups:
        - !Ref EfsSecurityGroup

  EfsMountTarget2:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref DataFileSystem
      SubnetId: !Ref PublicSubnet2
      SecurityGroups:
        - !Ref EfsSecurityGroup

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub cv-match-alb-${AWS::StackName}
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref AllowedIngressCidr
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0

  EcsTaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub cv-match-ecs-${AWS::StackName}
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          SourceSecurityGroupId: !Ref AlbSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref AlbSecurityGroup

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Port: 3000
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VpcId
      HealthCheckEnabled: true
      HealthCheckPath: /
      HealthCheckProtocol: HTTP
      Matcher:
        HttpCode: 200-399

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub cv-match-${AWS::StackName}
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  EcsTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  EcsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockInvoke
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: InvokeFoundationModels
                Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource: '*'

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    DependsOn:
      - EfsMountTarget1
      - EfsMountTarget2
    Properties:
      Family: !Sub cv-match-${AWS::StackName}
      Cpu: !Ref ContainerCpu
      Memory: !Ref ContainerMemory
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt EcsTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt EcsTaskRole.Arn
      Volumes:
        - Name: cv-match-data
          EfsVolumeConfiguration:
            FilesystemId: !Ref DataFileSystem
            TransitEncryption: DISABLED
      ContainerDefinitions:
        - Name: cv-match
          Image: !Ref ImageUri
          Essential: true
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: CV_MATCH_DATA_ROOT
              Value: /data
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: BEDROCK_TEXT_MODEL_ID
              Value: !Ref BedrockTextModelId
            - Name: BEDROCK_EMBEDDING_MODEL_ID
              Value: !Ref BedrockEmbeddingModelId
          MountPoints:
            - SourceVolume: cv-match-data
              ContainerPath: /data
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref AppLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: cv-match

  EcsService:
    Type: AWS::ECS::Service
    DependsOn:
      - HttpListener
    Properties:
      ServiceName: !Sub cv-match-${AWS::StackName}
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      DeploymentConfiguration:
        MinimumHealthyPercent: 0
        MaximumPercent: 200
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets:
            - !Ref PublicSubnet1
            - !Ref PublicSubnet2
          SecurityGroups:
            - !Ref EcsTaskSecurityGroup
      LoadBalancers:
        - ContainerName: cv-match
          ContainerPort: 3000
          TargetGroupArn: !Ref TargetGroup

Outputs:
  LoadBalancerDns:
    Description: Open http://DNS in a browser (after tasks are healthy)
    Value: !GetAtt LoadBalancer.DNSName
    Export:
      Name: !Sub ${AWS::StackName}-AlbDns

  ClusterName:
    Description: ECS cluster name
    Value: !Ref EcsCluster

  FileSystemId:
    Description: EFS file system id (persistent app data)
    Value: !Ref DataFileSystem

  TaskExecutionRoleArn:
    Description: Task execution role (ECR, logs)
    Value: !GetAtt EcsTaskExecutionRole.Arn

  TaskRoleArn:
    Description: Task role (Bedrock invoke)
    Value: !GetAtt EcsTaskRole.Arn